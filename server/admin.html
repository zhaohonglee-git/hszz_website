<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>华晟智造 · 客户管理中心</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{brand:{blue:'#0066FF',orange:'#F97316'}}}}}</script>
</head>
<body class="bg-gray-50 min-h-screen font-sans antialiased">

<!-- ====== 登录 ====== -->
<div id="login-screen" class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm bg-white rounded-2xl shadow-xl p-8">
    <div class="text-center mb-6">
      <div class="w-12 h-12 mx-auto rounded-xl bg-brand-blue flex items-center justify-center mb-3">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 32 32"><path d="M16 2L28 8V24L16 30L4 24V8L16 2Z" stroke-linejoin="round"/><circle cx="16" cy="16" r="6"/></svg>
      </div>
      <h1 class="text-xl font-bold text-gray-900">华晟智造</h1>
      <p class="text-sm text-gray-500 mt-1">客户管理中心</p>
    </div>
    <form id="login-form" class="space-y-4">
      <input id="login-pw" type="password" placeholder="请输入管理密码" autocomplete="current-password"
             class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-brand-blue"/>
      <p id="login-error" class="text-xs text-red-500 hidden">密码错误，请重试</p>
      <button type="submit" class="w-full py-3 rounded-xl bg-brand-blue text-white font-semibold text-sm hover:bg-blue-700 transition-colors">登录</button>
    </form>
  </div>
</div>

<!-- ====== 主界面 ====== -->
<div id="main-screen" class="hidden">
  <header class="bg-white border-b border-gray-200 sticky top-0 z-30">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 h-14 flex items-center justify-between">
      <span class="text-sm font-bold text-gray-900">🏭 华晟智造 · 管理中心</span>
      <div class="flex items-center gap-4">
        <span id="last-refresh" class="text-xs text-gray-400"></span>
        <button onclick="logout()" class="text-xs text-gray-500 hover:text-red-500">退出</button>
      </div>
    </div>
  </header>
  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6">
    <!-- Tab 导航 -->
    <div class="flex gap-1 mb-6 bg-gray-100 rounded-xl p-1 w-fit">
      <button class="admin-tab active px-4 py-2 rounded-lg text-sm font-medium bg-white text-gray-900 shadow-sm transition-all" data-tab="submissions">📋 客户管理</button>
      <button class="admin-tab px-4 py-2 rounded-lg text-sm font-medium text-gray-500 hover:text-gray-700 transition-all" data-tab="cases">📁 案例管理</button>
    </div>

    <!-- 客户管理 Tab -->
    <div id="tab-submissions">
    <!-- 统计卡片 -->
    <div id="stats-row" class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6"></div>
    <!-- 筛选 -->
    <div class="bg-white rounded-xl border border-gray-200 p-4 mb-4">
      <div class="flex flex-wrap items-center gap-3">
        <select id="f-type" class="text-sm rounded-lg border-gray-200 px-3 py-2 focus:ring-brand-blue"><option value="">全部类型</option><option value="diagnostic">诊断</option><option value="contact">联系</option></select>
        <select id="f-status" class="text-sm rounded-lg border-gray-200 px-3 py-2 focus:ring-brand-blue"><option value="">全部状态</option><option value="new">新提交</option><option value="contacted">已联系</option><option value="processing">处理中</option><option value="completed">已完成</option></select>
        <select id="f-brand" class="text-sm rounded-lg border-gray-200 px-3 py-2 focus:ring-brand-blue"><option value="">全部品牌</option><option>ESTUN</option><option>ABB</option><option>FANUC</option><option>KUKA</option><option>YASKAWA</option></select>
        <input id="f-search" type="text" placeholder="搜索姓名/电话/公司..." class="flex-1 min-w-[160px] text-sm rounded-lg border-gray-200 px-3 py-2 focus:ring-brand-blue"/>
        <button onclick="loadData()" class="px-3 py-2 text-xs font-medium rounded-lg bg-brand-blue text-white hover:bg-blue-700">查询</button>
        <button onclick="reset()" class="px-3 py-2 text-xs font-medium rounded-lg bg-gray-100 text-gray-600 hover:bg-gray-200">重置</button>
      </div>
    </div>
    <!-- 表格 -->
    <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm"><thead><tr class="bg-gray-50 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider"><th class="px-4 py-3">ID</th><th class="px-4 py-3">类型</th><th class="px-4 py-3">姓名</th><th class="px-4 py-3">电话</th><th class="px-4 py-3">品牌/故障</th><th class="px-4 py-3">状态</th><th class="px-4 py-3">时间</th><th class="px-4 py-3">操作</th></tr></thead><tbody id="tbody" class="divide-y divide-gray-100"></tbody></table>
      </div>
      <div id="empty" class="hidden text-center py-12 text-gray-400 text-sm">暂无数据</div>
      <div id="pager" class="flex items-center justify-between px-4 py-3 border-t border-gray-100 bg-gray-50/50"></div>
    </div>
    </div><!-- /tab-submissions -->

    <!-- 案例管理 Tab -->
    <div id="tab-cases" class="hidden">
      <div class="flex items-center justify-between mb-4">
        <span class="text-sm text-gray-500" id="cases-info"></span>
        <button onclick="openCaseForm()" class="px-4 py-2 rounded-lg bg-brand-blue text-white text-sm font-medium hover:bg-blue-700">+ 新增案例</button>
      </div>
      <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm"><thead><tr class="bg-gray-50 text-left text-xs font-semibold text-gray-500 uppercase"><th class="px-4 py-3 w-16">封面</th><th class="px-4 py-3">标题</th><th class="px-4 py-3">行业</th><th class="px-4 py-3">时间</th><th class="px-4 py-3 w-24">操作</th></tr></thead><tbody id="cases-tbody" class="divide-y divide-gray-100"></tbody></table>
        </div>
        <div id="cases-empty" class="hidden text-center py-12 text-gray-400 text-sm">暂无案例</div>
      </div>

      <!-- 案例表单弹窗 -->
      <div id="case-form-modal" class="hidden fixed inset-0 z-50 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4" onclick="if(event.target===this)closeCaseForm()">
        <div class="bg-white rounded-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto shadow-2xl">
          <div class="sticky top-0 bg-white border-b px-6 py-4 flex items-center justify-between rounded-t-2xl"><h3 class="text-base font-bold" id="case-form-title">新增案例</h3><button onclick="closeCaseForm()" class="text-gray-400 hover:text-gray-600 text-lg">✕</button></div>
          <form id="case-form" class="p-6 space-y-4">
            <input type="hidden" id="case-id"/>
            <div><label class="text-xs text-gray-400 block mb-1">标题 <span class="text-red-400">*</span></label><input id="case-title" required class="w-full text-sm rounded-lg border-gray-200 px-3 py-2 focus:ring-brand-blue"/></div>
            <div><label class="text-xs text-gray-400 block mb-1">行业 <span class="text-red-400">*</span></label><input id="case-industry" required placeholder="如：汽车制造、新能源..." class="w-full text-sm rounded-lg border-gray-200 px-3 py-2 focus:ring-brand-blue"/></div>
            <div><label class="text-xs text-gray-400 block mb-1">描述</label><textarea id="case-desc" rows="3" class="w-full text-sm rounded-lg border-gray-200 px-3 py-2 focus:ring-brand-blue resize-none"></textarea></div>
            <div><label class="text-xs text-gray-400 block mb-1">封面图片 (8:5)</label><input type="file" id="case-image-file" accept="image/*" class="w-full text-sm"/><p id="case-image-path" class="text-xs text-gray-400 mt-1 hidden"></p></div>
            <button type="submit" class="w-full py-2.5 rounded-xl bg-brand-blue text-white text-sm font-semibold hover:bg-blue-700">保存</button>
          </form>
        </div>
      </div>
    </div><!-- /tab-cases -->

  </main>
</div>

<!-- ====== 详情弹窗 ====== -->
<div id="modal" class="hidden fixed inset-0 z-50 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4" onclick="if(event.target===this)closeModal()">
  <div class="bg-white rounded-2xl w-full max-w-lg max-h-[85vh] overflow-y-auto shadow-2xl">
    <div class="sticky top-0 bg-white border-b border-gray-100 px-6 py-4 flex items-center justify-between rounded-t-2xl">
      <h3 class="text-base font-bold text-gray-900">提交详情</h3><button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-lg">✕</button>
    </div>
    <div id="modal-body" class="p-6 space-y-4"></div>
  </div>
</div>

<script>
let token = sessionStorage.getItem('hszz_token'), page = 1, detailId = null
if (token) { showMain(); loadData() }

document.getElementById('login-form').addEventListener('submit', async e => {
  e.preventDefault()
  const res = await fetch('/api/admin/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:document.getElementById('login-pw').value}) })
  if (res.ok) { const d = await res.json(); token = d.token; sessionStorage.setItem('hszz_token', token); document.getElementById('login-error').classList.add('hidden'); showMain(); loadData() }
  else { document.getElementById('login-error').classList.remove('hidden') }
})

function showMain() { document.getElementById('login-screen').classList.add('hidden'); document.getElementById('main-screen').classList.remove('hidden') }
function logout() { sessionStorage.removeItem('hszz_token'); location.reload() }

async function api(url, opts = {}) {
  const res = await fetch(url, { ...opts, headers: { ...opts.headers, Authorization: `Bearer ${token}` } })
  if (res.status === 401) { logout(); throw new Error('Unauthorized') }
  return res.json()
}

async function loadData(p = 1) {
  page = p
  const q = new URLSearchParams()
  const t = document.getElementById('f-type').value, s = document.getElementById('f-status').value
  const b = document.getElementById('f-brand').value, kw = document.getElementById('f-search').value.trim()
  if (t) q.set('type', t); if (s) q.set('status', s); if (b) q.set('brand', b); if (kw) q.set('search', kw)
  q.set('limit', '20'); q.set('offset', String((p-1)*20))
  const [data, stats] = await Promise.all([api(`/api/admin/submissions?${q}`), api('/api/admin/stats')])

  document.getElementById('stats-row').innerHTML =
    `<div class="bg-white rounded-xl p-5 border border-gray-100 shadow-sm"><p class="text-2xl font-bold">${stats.total}</p><p class="text-xs text-gray-500 mt-1">总提交</p></div>
     <div class="bg-white rounded-xl p-5 border border-gray-100 shadow-sm"><p class="text-2xl font-bold text-brand-blue">${stats.today_count}</p><p class="text-xs text-gray-500 mt-1">今日新增</p></div>
     <div class="bg-white rounded-xl p-5 border border-gray-100 shadow-sm"><p class="text-2xl font-bold text-orange-500">${stats.new_count}</p><p class="text-xs text-gray-500 mt-1">待处理</p></div>
     <div class="bg-white rounded-xl p-5 border border-gray-100 shadow-sm"><p class="text-2xl font-bold">${stats.diagnostic_count}/${stats.contact_count}</p><p class="text-xs text-gray-500 mt-1">诊断/联系</p></div>`

  const rows = data.rows
  const tbody = document.getElementById('tbody'), empty = document.getElementById('empty')
  if (!rows.length) { tbody.innerHTML = ''; empty.classList.remove('hidden') }
  else {
    empty.classList.add('hidden')
    const tb = t => t==='diagnostic'?'<span class="inline-flex px-2 py-0.5 rounded-full text-xs font-medium bg-blue-50 text-blue-700">诊断</span>':'<span class="inline-flex px-2 py-0.5 rounded-full text-xs font-medium bg-green-50 text-green-700">联系</span>'
    const sb = s => ({new:'bg-red-50 text-red-700',contacted:'bg-yellow-50 text-yellow-700',processing:'bg-blue-50 text-blue-700',completed:'bg-green-50 text-green-700'})[s]||'bg-gray-100 text-gray-500'
    const sl = s => ({new:'新提交',contacted:'已联系',processing:'处理中',completed:'已完成'})[s]||s
    tbody.innerHTML = rows.map(r => `<tr class="cursor-pointer hover:bg-gray-50" onclick="openDetail(${r.id})">
      <td class="px-4 py-3 text-gray-400 text-xs">#${r.id}</td><td class="px-4 py-3">${tb(r.type)}</td>
      <td class="px-4 py-3 font-medium text-gray-900">${esc(r.name)}</td><td class="px-4 py-3 text-gray-600">${esc(r.phone)}</td>
      <td class="px-4 py-3 text-xs text-gray-500">${esc(r.brand||'-')} / ${esc(r.fault||'-')}</td>
      <td class="px-4 py-3"><span class="inline-flex px-2 py-0.5 rounded-full text-xs font-medium ${sb(r.status)}">${sl(r.status)}</span></td>
      <td class="px-4 py-3 text-xs text-gray-400">${r.created_at}</td>
      <td class="px-4 py-3"><button class="px-3 py-1.5 text-xs rounded-lg bg-gray-100 text-gray-600 hover:bg-gray-200" onclick="event.stopPropagation();openDetail(${r.id})">查看</button></td></tr>`).join('')
  }

  const pages = Math.ceil(data.total / 20), pager = document.getElementById('pager')
  if (pages <= 1) pager.innerHTML = `<span class="text-xs text-gray-400 px-4">共 ${data.total} 条</span>`
  else { let h = `<span class="text-xs text-gray-400">共 ${data.total} 条 · ${pages} 页</span><div class="flex gap-1">`
    for (let i = 1; i <= pages; i++) h += `<button onclick="loadData(${i})" class="w-8 h-8 rounded-lg text-xs font-medium ${i===page?'bg-brand-blue text-white':'text-gray-600 hover:bg-gray-100'}">${i}</button>`
    pager.innerHTML = h + '</div>' }
  document.getElementById('last-refresh').textContent = `更新于 ${new Date().toLocaleTimeString()}`
}

function reset() { ['f-type','f-status','f-brand'].forEach(id => document.getElementById(id).value=''); document.getElementById('f-search').value=''; loadData(1) }
['f-type','f-status','f-brand'].forEach(id => document.getElementById(id).addEventListener('change', ()=>loadData(1)))
document.getElementById('f-search').addEventListener('keydown', e => { if (e.key==='Enter') loadData(1) })

async function openDetail(id) {
  detailId = id
  const r = await api(`/api/admin/submissions/${id}`)
  const files = JSON.parse(r.files || '[]')
  document.getElementById('modal-body').innerHTML = `
    <div class="flex gap-2 mb-2"><span class="inline-flex px-2 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-700">${r.type==='diagnostic'?'诊断表单':'联系表单'}</span></div>
    <div class="grid grid-cols-2 gap-3 text-sm">
      <div><span class="text-xs text-gray-400">姓名</span><p class="font-medium">${esc(r.name)}</p></div>
      <div><span class="text-xs text-gray-400">电话</span><p class="font-medium"><a href="tel:${esc(r.phone)}" class="text-brand-blue">${esc(r.phone)}</a></p></div>
      ${r.company?`<div><span class="text-xs text-gray-400">公司</span><p>${esc(r.company)}</p></div>`:''}
      ${r.brand?`<div><span class="text-xs text-gray-400">品牌</span><p>${esc(r.brand)}</p></div>`:''}
      ${r.fault?`<div><span class="text-xs text-gray-400">故障类型</span><p>${esc(r.fault)}</p></div>`:''}
    </div>
    ${r.description?`<div><span class="text-xs text-gray-400">故障描述</span><p class="text-sm whitespace-pre-wrap mt-1">${esc(r.description)}</p></div>`:''}
    ${r.message?`<div><span class="text-xs text-gray-400">留言</span><p class="text-sm whitespace-pre-wrap mt-1">${esc(r.message)}</p></div>`:''}
    ${files.length?`<div><span class="text-xs text-gray-400">附件 (${files.length})</span><div class="mt-1 space-y-1">${files.map(f=>`<a href="/uploads/${f.path}" target="_blank" class="block text-sm text-brand-blue hover:underline">📎 ${esc(f.name)} (${(f.size/1024/1024).toFixed(1)}MB)</a>`).join('')}</div></div>`:''}
    <div class="border-t pt-4"><label class="text-xs text-gray-400 block mb-1.5">状态</label>
      <select id="det-status" class="w-full text-sm rounded-lg border-gray-200 px-3 py-2 mb-3">
        <option value="new" ${r.status==='new'?'selected':''}>新提交</option><option value="contacted" ${r.status==='contacted'?'selected':''}>已联系</option><option value="processing" ${r.status==='processing'?'selected':''}>处理中</option><option value="completed" ${r.status==='completed'?'selected':''}>已完成</option></select>
      <label class="text-xs text-gray-400 block mb-1.5">备注</label>
      <textarea id="det-notes" rows="3" class="w-full text-sm rounded-lg border-gray-200 px-3 py-2 resize-none">${esc(r.notes||'')}</textarea>
      <button onclick="saveDetail()" class="mt-3 w-full py-2.5 rounded-xl bg-brand-blue text-white text-sm font-semibold hover:bg-blue-700">保存</button></div>
    <div class="text-xs text-gray-400">创建：${r.created_at} · 更新：${r.updated_at}</div>`
  document.getElementById('modal').classList.remove('hidden')
}
function closeModal() { document.getElementById('modal').classList.add('hidden') }
async function saveDetail() {
  await api(`/api/admin/submissions/${detailId}`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status:document.getElementById('det-status').value, notes:document.getElementById('det-notes').value}) })
  closeModal(); loadData(page)
}
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML }

// ==================== Tab 切换 ====================
document.querySelectorAll('.admin-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.admin-tab').forEach(b => { b.classList.remove('active','bg-white','text-gray-900','shadow-sm'); b.classList.add('text-gray-500') })
    btn.classList.add('active','bg-white','text-gray-900','shadow-sm'); btn.classList.remove('text-gray-500')
    document.getElementById('tab-submissions').classList.toggle('hidden', btn.dataset.tab !== 'submissions')
    document.getElementById('tab-cases').classList.toggle('hidden', btn.dataset.tab !== 'cases')
    if (btn.dataset.tab === 'cases') loadCasesList()
  })
})

// ==================== 案例管理 ====================
async function loadCasesList() {
  const data = await api('/api/cases?limit=100')
  const tbody = document.getElementById('cases-tbody'), empty = document.getElementById('cases-empty')
  document.getElementById('cases-info').textContent = `共 ${data.total} 个案例`
  if (!data.rows.length) { tbody.innerHTML = ''; empty.classList.remove('hidden'); return }
  empty.classList.add('hidden')
  tbody.innerHTML = data.rows.map(r => `<tr>
    <td class="px-4 py-3"><img src="${r.image}" class="w-12 h-7.5 rounded object-cover bg-gray-100" onerror="this.style.display='none'"/></td>
    <td class="px-4 py-3 font-medium text-gray-900 text-sm">${esc(r.title)}</td>
    <td class="px-4 py-3"><span class="inline-flex px-2 py-0.5 rounded-full text-xs bg-blue-50 text-blue-700">${esc(r.industry)}</span></td>
    <td class="px-4 py-3 text-xs text-gray-400">${r.created_at}</td>
    <td class="px-4 py-3 flex gap-1">
      <button onclick="editCase(${r.id})" class="px-2 py-1 text-xs rounded bg-gray-100 hover:bg-gray-200">编辑</button>
      <button onclick="deleteCaseItem(${r.id},'${esc(r.title)}')" class="px-2 py-1 text-xs rounded bg-red-50 text-red-600 hover:bg-red-100">删除</button>
    </td></tr>`).join('')
}

function openCaseForm(id) { document.getElementById('case-form-modal').classList.remove('hidden'); if (!id) { document.getElementById('case-form').reset(); document.getElementById('case-id').value=''; document.getElementById('case-form-title').textContent='新增案例' } }
function closeCaseForm() { document.getElementById('case-form-modal').classList.add('hidden') }

async function editCase(id) {
  openCaseForm(id)
  const data = await api('/api/cases?limit=100')
  const c = data.rows.find(r => r.id === id)
  if (!c) return
  document.getElementById('case-id').value = c.id
  document.getElementById('case-title').value = c.title
  document.getElementById('case-industry').value = c.industry
  document.getElementById('case-desc').value = c.description
  document.getElementById('case-image-path').textContent = c.image
  document.getElementById('case-image-path').classList.remove('hidden')
  document.getElementById('case-form-title').textContent = '编辑案例'
}

async function deleteCaseItem(id, title) {
  if (!confirm(`确定删除「${title}」？`)) return
  await api(`/api/admin/cases/${id}`, { method: 'DELETE' })
  loadCasesList()
}

document.getElementById('case-form').addEventListener('submit', async e => {
  e.preventDefault()
  const id = document.getElementById('case-id').value
  const fd = new FormData()
  fd.set('title', document.getElementById('case-title').value)
  fd.set('industry', document.getElementById('case-industry').value)
  fd.set('description', document.getElementById('case-desc').value)
  const file = document.getElementById('case-image-file').files[0]
  if (file) fd.set('image', file)
  else fd.set('image', document.getElementById('case-image-path').textContent || '')

  const url = id ? `/api/admin/cases/${id}` : '/api/admin/cases'
  const method = id ? 'PUT' : 'POST'
  await api(url, { method, body: fd, headers: {} }) // no Content-Type for FormData
  closeCaseForm()
  loadCasesList()
})
</script>
</body>
</html>
