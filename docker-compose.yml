# ============================================================
# 华晟智造 — Docker Compose 部署
# ============================================================
# 快速开始：
#   1. cp .env.example .env  &&  编辑 .env 设置管理密码
#   2. docker compose up -d
#   3. 网站    → http://your-domain.com:3001
#   4. 管理后台 → http://your-domain.com:3001/admin
#
# 域名挂载：配合 Nginx 将 80/443 反代到本容器 3001 端口

services:
  hszz-website:
    build: .
    container_name: hszz-website
    restart: unless-stopped
    ports:
      - "3002:3001"
    volumes:
      - ./server/data.db:/app/server/data.db
      - ./server/uploads:/app/server/uploads
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-hszz2024admin}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/admin/stats',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 5s
      retries: 3

